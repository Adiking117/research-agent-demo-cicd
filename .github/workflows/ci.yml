name: CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout source code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Login to GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Convert GitHub repository name to lowercase
      - name: Set Docker Image Name
        run: |
          echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 4. Build Docker image
      - name: Build Docker Image
        run: |
          docker build \
            -t ghcr.io/${IMAGE_NAME}:latest \
            .

      # 5. Push Docker image to GHCR
      - name: Push Docker Image
        run: |
          docker push \
            ghcr.io/${IMAGE_NAME}:latest

      # 6. Install Railway CLI
      - name: Install Railway CLI
        run: |
          npm install -g @railway/cli

      - name: Redeploy Railway Service
        run: |
          railway redeploy \
            --service ${{ secrets.RAILWAY_SERVICE_ID }} \
            --project ${{ secrets.RAILWAY_PROJECT_ID }} \
            --environment ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}