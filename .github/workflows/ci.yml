name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Validate Python
        run: |
          python -m py_compile app.py
          python -m py_compile agent.py
          python -m py_compile search.py
          python -m py_compile summarize.py

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ghcr.io/adiking117/research-agent-demo-cicd:latest \
            .

      - name: Push Docker Image
        run: |
          docker push \
            ghcr.io/adiking117/research-agent-demo-cicd:latest

      # - name: Trigger Railway Deployment
      #   run: |
      #     curl -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK }}"